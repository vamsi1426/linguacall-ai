# JVM: cap metaspace to reduce pressure on low-disk / Windows setups; UTF-8 avoids path/encoding edge cases
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
android.nonFinalResIds=true
# Windows + project on D: + pub cache on C: Kotlin incremental cannot relativize across drive roots
# (RelocatableFileToPathConverter / shared_preferences_android, path_provider_android, etc.)
kotlin.incremental=false
kotlin.incremental.android=false
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configuration-cache=false
org.gradle.caching=true
